<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura | Digital Invitation</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+Devanagari:wght@400;700&family=Yatra+One&display=swap" rel="stylesheet">
    
    <style>
        @import "tailwindcss";

        @theme {
            --font-playfair: "Playfair Display", serif;
            --font-montserrat: "Montserrat", sans-serif;
            --font-yatra: "Yatra One", cursive;
            --font-devanagari: "Noto Sans Devanagari", sans-serif;
            
            --color-cream: #FDFBF7;
            --color-charcoal: #333333;
            --color-gold: #C5A059;
            --color-gold-dark: #A68545;
        }

        body {
            background-color: #FDFBF7;
            color: #333333;
            font-family: 'Montserrat', 'Noto Sans Devanagari', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .font-yatra { 
            font-family: 'Yatra One', cursive; 
            line-height: 1.3;
        }

        .text-glow {
            text-shadow: 0 0 15px rgba(197, 160, 89, 0.3);
        }

        .gold-gradient-text {
            background: linear-gradient(to right, #C5A059, #A68545, #C5A059);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #C5A059 0%, #E2C68E 50%, #C5A059 100%);
        }

        .vinyl-rotate {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .img-frame {
            position: relative;
            padding: 10px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }

        .img-frame::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border: 1px solid #C5A059;
            pointer-events: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #C5A059;
        }

        /* Fix for Marathi text fitting */
        .marathi-fit {
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
